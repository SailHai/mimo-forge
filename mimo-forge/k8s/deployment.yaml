apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimo-forge
  labels: { app: mimo-forge }
spec:
  replicas: 3
  selector:
    matchLabels: { app: mimo-forge }
  template:
    metadata:
      labels: { app: mimo-forge }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: mimo-forge
          image: ghcr.io/mimoforge/mimo-forge:latest
          ports: [{ containerPort: 8080 }]
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2000m", memory: "4Gi" }
          env:
            - name: MIMO_API_KEY
              valueFrom:
                secretKeyRef: { name: mimo-secrets, key: mimo-api-key }
            - name: DB_HOST
              value: postgres-service
            - name: REDIS_HOST
              value: redis-service
            - name: MILVUS_HOST
              value: milvus-service
          livenessProbe:
            httpGet: { path: /api/v1/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /api/v1/health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mimo-forge-service
spec:
  selector: { app: mimo-forge }
  ports: [{ port: 80, targetPort: 8080 }]
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mimo-forge-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mimo-forge
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
